@if (member(); as m){
<div class="card bg-base-100 shadow-xl relative hover:shadow-2xl transition-shadow duration-300">
  <img src="{{m.imageUrl || '/user.png'}}" alt="{{m.displayName}} image"
    class="rounded-lg aspect-square object-cover"
  />
  <div class="card-actions bg-black z-10 absolute bottom-0 w-full px-3 py-1 
    rounded-b-lg bg-gradient-to-t from-black via-black/75 to-black/0">
    <div class="flex flex-col text-white">
      <span class="font-semibold">{{m.displayName}}, {{m.dateOfBirth | age}}</span>
      <span class="text-sm">{{m.city}}</span>
    </div>
  </div>
</div>
}
